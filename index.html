    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <script>
      (function () {
        var DEFAULT_LANGUAGE = "tr";
        var STORAGE_KEYS = ["qr_lang", "beyproGuestLanguage", "beyproLanguage"];

        function normalizeLanguage(raw) {
          if (!raw) return null;
          var normalized = String(raw).trim().toLowerCase();
          if (!normalized) return null;
          var mapped =
            normalized === "english"
              ? "en"
              : normalized === "turkish"
                ? "tr"
                : normalized === "german"
                  ? "de"
                  : normalized === "french"
                    ? "fr"
                    : normalized.split("-")[0];
          return ["tr", "en", "de", "fr"].indexOf(mapped) >= 0 ? mapped : null;
        }

        var resolved = DEFAULT_LANGUAGE;
        try {
          for (var i = 0; i < STORAGE_KEYS.length; i += 1) {
            var candidate = normalizeLanguage(window.localStorage.getItem(STORAGE_KEYS[i]));
            if (candidate) {
              resolved = candidate;
              break;
            }
          }

          STORAGE_KEYS.forEach(function (key) {
            window.localStorage.setItem(key, resolved);
          });
        } catch (error) {}

        document.documentElement.lang = resolved;
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #0f172a;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
        background: #0f172a;
      }
      .boot-splash {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .boot-splash__content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #fff;
      }
      .boot-splash__logo {
        width: 96px;
        height: 96px;
        margin-bottom: 16px;
        border-radius: 24px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.18);
        padding: 8px;
        box-sizing: border-box;
      }
      .boot-splash__title {
        margin: 0 0 16px;
        font: 800 42px/1 "Gotham", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        letter-spacing: -0.03em;
      }
      .boot-splash__spinner {
        width: 48px;
        height: 48px;
        border-radius: 999px;
        border: 4px solid rgba(255, 255, 255, 0.22);
        border-top-color: rgba(255, 255, 255, 0.92);
        animation: boot-splash-spin 0.9s linear infinite;
      }
      .boot-splash__subtitle {
        margin-top: 14px;
        font: 500 14px/1.2 "Gotham", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        opacity: 0.82;
      }
      @keyframes boot-splash-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>

      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' https: http: data: blob:; font-src 'self' https:; connect-src 'self' https://hurrypos-backend.onrender.com http://localhost:5000 http://127.0.0.1:7777 ws: wss: http: https:; manifest-src 'self' https://hurrypos-backend.onrender.com http://localhost:5000; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; media-src 'self' https: http: blob: data:; worker-src 'self' blob:;"
    />

  <body>
    <div id="root"></div>
    <script>
      (function () {
        var root = document.getElementById("root");
        if (!root) return;

        function escapeHtml(value) {
          return String(value || "").replace(/[&<>"']/g, function (char) {
            return {
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            }[char];
          });
        }

        function toDisplayNameFromIdentifier(value) {
          return String(value || "")
            .replace(/[-_]+/g, " ")
            .trim()
            .replace(/\b\w/g, function (char) {
              return char.toUpperCase();
            });
        }

        function resolveBrandingAsset(raw) {
          var value = String(raw || "").trim();
          if (!value) return "";
          if (/^https?:\/\//i.test(value)) return value;
          if (value.startsWith("/uploads/")) return value;
          if (value.startsWith("uploads/")) return "/" + value;
          if (value.startsWith("/")) return value;
          return "/uploads/" + value.replace(/^\/?uploads\//, "");
        }

        function isPublicQrPath(pathname) {
          var reserved = {
            login: true,
            "staff-login": true,
            dashboard: true,
            "customer-insights": true,
            "marketing-campaigns": true,
            orders: true,
            payments: true,
            "cash-register": true,
            products: true,
            kitchen: true,
            suppliers: true,
            stock: true,
            production: true,
            tables: true,
            tableoverview: true,
            transaction: true,
            reports: true,
            staff: true,
            task: true,
            "live-route": true,
            takeaway: true,
            "user-management": true,
            printers: true,
            cameras: true,
            "scan-ticket": true,
            settings: true,
            subscription: true,
            expenses: true,
            "ingredient-prices": true,
            "cash-register-history": true,
            integrations: true,
            "qr-menu-settings": true,
            maintenance: true,
            unauthorized: true,
            qr: true,
            menu: true,
            "qr-menu": true,
            standalone: true,
            "standalone-register": true,
          };
          var path = String(pathname || "");
          if (!path || path === "/") return false;
          if (path === "/qr" || path === "/menu") return true;
          if (path.indexOf("/qr-menu/") === 0) return true;
          var segments = path.split("/").filter(Boolean);
          return segments.length === 1 && !reserved[segments[0]];
        }

        function readQrBootBranding() {
          var pathname = window.location.pathname || "";
          var params = new URLSearchParams(window.location.search || "");
          var segments = pathname.split("/").filter(Boolean);
          var candidates = [];

          function pushCandidate(value) {
            var normalized = String(value || "").trim();
            if (!normalized) return;
            if (candidates.indexOf(normalized) === -1) candidates.push(normalized);
          }

          pushCandidate(params.get("identifier"));
          pushCandidate(params.get("slug"));
          pushCandidate(params.get("id"));

          if (segments[0] === "qr-menu") {
            pushCandidate(segments[2]);
            pushCandidate(segments[1]);
          } else if (segments.length === 1 && segments[0] !== "qr" && segments[0] !== "menu") {
            pushCandidate(segments[0]);
          }

          try {
            pushCandidate(window.localStorage.getItem("qr_last_identifier"));
            pushCandidate(window.localStorage.getItem("restaurant_slug"));
          } catch (error) {}

          var tryKeys = [];
          candidates.forEach(function (id) {
            tryKeys.push(id, id.toLowerCase(), encodeURIComponent(id));
          });

          var customization = null;
          for (var i = 0; i < tryKeys.length; i += 1) {
            var key = tryKeys[i];
            if (!key) continue;
            try {
              var raw = window.localStorage.getItem("qr-menu-branding-cache:" + key);
              if (!raw) continue;
              var parsed = JSON.parse(raw);
              if (parsed && typeof parsed === "object") {
                customization = parsed;
                break;
              }
            } catch (error) {}
          }

          var fallbackIdentifier = candidates[0] || "";
          return {
            label:
              String(
                (customization && (customization.app_display_name || customization.main_title)) ||
                  toDisplayNameFromIdentifier(fallbackIdentifier) ||
                  "Beypro"
              ).trim() || "Beypro",
            logo: resolveBrandingAsset(
              customization &&
                (customization.splash_logo ||
                  customization.main_title_logo ||
                  customization.apple_touch_icon ||
                  customization.app_icon_192 ||
                  customization.app_icon_512 ||
                  customization.app_icon)
            ),
            primary:
              String((customization && customization.pwa_primary_color) || "#4F46E5").trim() ||
              "#4F46E5",
            background:
              String((customization && customization.pwa_background_color) || "#6D28D9").trim() ||
              "#6D28D9",
          };
        }

        var isQr = isPublicQrPath(window.location.pathname || "");
        var splash = isQr
          ? readQrBootBranding()
          : {
              label: "Beypro",
              logo: "",
              primary: "#4F46E5",
              background: "#6D28D9",
            };
        var gradient =
          "linear-gradient(160deg, " + splash.primary + " 0%, " + splash.background + " 100%)";

        document.documentElement.style.background = gradient;
        document.body.style.background = gradient;
        root.style.background = gradient;

        root.innerHTML =
          '<div class="boot-splash" style="background:' +
          gradient +
          '"><div class="boot-splash__content">' +
          (splash.logo
            ? '<img class="boot-splash__logo" src="' +
              escapeHtml(splash.logo) +
              '" alt="' +
              escapeHtml(splash.label) +
              '">'
            : "") +
          '<div class="boot-splash__spinner"></div><div class="boot-splash__subtitle">' +
          (isQr ? "Loading menu..." : "Starting up...") +
          "</div></div></div>";
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Beypro POS: print helpers (safe to paste anywhere after your root element) -->
    <div
      id="beypro-portals"
      style="position: fixed; left: -99999px; top: -99999px"
    ></div>
    <script>
      // Optional diagnostic: does the browser allow popups (for print window)?
      window.beyproCanPopup = function () {
        try {
          const w = window.open("", "", "width=1,height=1");
          if (w) {
            w.close();
            return true;
          }
        } catch (e) {}
        return false;
      };
      // Mark first user gesture so audio/popups can unlock early if needed
      window.addEventListener("pointerdown", function once() {
        window.dispatchEvent(new Event("beypro_user_interacted"));
        window.removeEventListener("pointerdown", once);
      });
    </script>
